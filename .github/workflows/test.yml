name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  # Run the workflow regularly, as auto-merged PRs by bots may not trigger it.
  schedule:
    - cron: "0 0 1,15 * *"
  # Allow manual triggering of the workflow.
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    env:
      FORCE_COLOR: 1
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install npm
        run: |
          npm install --global npm@"$(npm pkg get 'engines.npm' | jq -r .)"
          npm -v
      - name: Install dependencies
        run: npm ci
      - name: Check built files
        run: git diff --exit-code
      - name: Test
        run: npm run test:coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  smoke:
    runs-on: ubuntu-latest # ubuntu-slim would require setup-node.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run local action
        id: npm-audit-fix
        uses: ./
      - name: Verify outputs
        if: ${{ steps.npm-audit-fix.outputs.pull_request_url }}
        shell: bash
        env:
          pull_request_url: ${{ steps.npm-audit-fix.outputs.pull_request_url }}
          branch_name: ${{ steps.npm-audit-fix.outputs.branch_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "pull_request_url: ${pull_request_url}"
          echo "branch_name: ${branch_name}"

          head_ref_name=$(gh pr view "${pull_request_url}" --json headRefName --jq .headRefName)
          echo "head_ref_name: ${head_ref_name}"

          if [[ "${branch_name}" != "${head_ref_name}" ]]; then
            echo "::error::Branch names are unexpected: '${branch_name}' != '${head_ref_name}'"
            exit 1
          fi

  lint:
    uses: ybiquitous/.github/.github/workflows/nodejs-lint-reusable.yml@46e5ee1d74cc40a0448a372e22cf3e5852efd59a # v3.0.2
    permissions:
      contents: read
