name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    uses: ybiquitous/.github/.github/workflows/nodejs-release-reusable.yml@0ebbcd566ff759b0399d9c036be5c205a03053b1 # v3.1.0
    with:
      publish: false
      draft: false
      update-semver-tag: true
    permissions:
      contents: write
      id-token: write
